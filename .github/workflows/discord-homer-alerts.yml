name: Discord Homer Alerts

on:
  schedule:
    - cron: "*/15 16-23 * * *"
    - cron: "*/15 0-3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  alerts:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Check for live homer alerts
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python alert_homers.py

      - name: Push alert updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add picks_history.csv
          git diff --staged --quiet || git commit -m "update homer alerts $(date -u '+%Y-%m-%d %H:%M')"
          git push
