name: Daily Dashboard Update

on:
  schedule:
    - cron: "0 14 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Pull Statcast data
        run: python pull_data.py

      - name: Check previous results
        run: python check_results.py

      - name: Build features
        run: python build_features.py

      - name: Train model
        run: python train_model.py

      - name: Generate dashboard
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python dashboard.py

      - name: Push updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add homerun_data_all.csv
          git add hitter_profiles.csv
          git add pitcher_profiles.csv
          git add homerun_data_enriched.csv
          git add hr_model.pkl
          git add model_features.csv
          git add index.html
          git add picks_history.csv 2>/dev/null || true
          git diff --staged --quiet || git commit -m "daily update $(date -u '+%Y-%m-%d')"
          git push
