name: Retrain Homerun Model

on:
  workflow_dispatch:
  schedule:
    - cron: "0 15 * * 1"

permissions:
  contents: write

jobs:
  retrain:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Pull Statcast data
        run: python pull_data.py

      - name: Build features
        run: python build_features.py

      - name: Train model
        run: python train_model.py

      - name: Generate dashboard
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python dashboard.py

      - name: Push retrained outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
                - name: Push retrained outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add hitter_profiles.csv
          git add pitcher_profiles.csv
          git add hr_model.pkl
          git add model_features.csv
          git add index.html
          git diff --staged --quiet || git commit -m "retrain model $(date -u '+%Y-%m-%d')"
          git push

          git add hitter_profiles.csv
          git add pitcher_profiles.csv
          git add homerun_data_enriched.csv
          git add hr_model.pkl
          git add model_features.csv
          git add index.html
          git diff --staged --quiet || git commit -m "retrain model $(date -u '+%Y-%m-%d')"
          git push
